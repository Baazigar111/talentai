name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Setup git identity
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          
          # 2. Create a temporary folder and copy backend content
          mkdir temp_sync
          cp -r backend/* temp_sync/
          cd temp_sync
          
          # 3. Initialize fresh git and push
          git init -b main
          git add .
          git commit -m "Deploy TalentAI Backend"
          git push --force https://Aankit123:$HF_TOKEN@huggingface.co/spaces/Aankit123/talentai-backend main
